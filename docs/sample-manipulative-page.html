<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Urgent Security Alert</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 760px; margin: 40px auto; line-height: 1.5; }
      .alert { border: 2px solid #b91c1c; background: #fee2e2; padding: 16px; border-radius: 8px; }
      .countdown { font-size: 1.3rem; color: #b91c1c; font-weight: 700; }
      .actions { display: flex; gap: 14px; margin-top: 20px; }
      .primary { background: #dc2626; color: #fff; border: none; padding: 14px 26px; border-radius: 6px; font-size: 1rem; }
      .secondary { background: #e5e7eb; color: #111827; border: none; padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <div class="alert">
      <h1>FINAL WARNING: Verify your PayPal account now</h1>
      <p>Urgent security alert. Your account will be suspended if you do not complete immediate action.</p>
      <p class="countdown">Offer expires in 09:59</p>
      <p>Only 3 verification slots left. Compliance required.</p>
      <div class="actions">
        <button class="primary">Continue Securely</button>
        <button class="secondary">No thanks, I don't like saving my account</button>
      </div>
    </div>
  </body>
</html>
